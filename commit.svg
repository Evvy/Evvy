<svg width="820" height="210" viewBox="0 0 820 210" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117; border-radius: 6px;">
  <style>
    .bg-empty { fill: #161b22; }
    .L1 { fill: #0e4429; }
    .L2 { fill: #006d32; }
    .L3 { fill: #26a641; }
    .L4 { fill: #39d353; }
    .red { fill: #f85149; }
    .text { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10px; }
    .code-bit { font-family: monospace; font-size: 9px; font-weight: bold; }
    
    /* Animation for the "Scanning" effect on the fixers */
    @keyframes scan {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    .scanner { animation: scan 0.5s infinite; }
  </style>

  <g class="text" transform="translate(70, 25)">
    <text x="0">Apr</text>
    <text x="60">May</text>
    <text x="120">Jun</text>
    <text x="180">Jul</text>
    <text x="240">Aug</text>
    <text x="300">Sep</text>
    <text x="360">Oct</text>
    <text x="420">Nov</text>
    <text x="480">Dec</text>
    <text x="540">Jan</text>
    <text x="600">Feb</text>
    <text x="660">Mar</text>
  </g>

  <g class="text" transform="translate(30, 52)">
    <text y="0">Mon</text>
    <text y="24">Wed</text>
    <text y="48">Fri</text>
  </g>

  <g transform="translate(65, 40)">
    <defs>
      <rect id="sq" width="10" height="10" rx="2" />
      
      <g id="week">
        <use href="#sq" y="0" class="bg-empty" />
        <use href="#sq" y="12" class="bg-empty" />
        <use href="#sq" y="24" class="bg-empty" />
        <use href="#sq" y="36" class="bg-empty" />
        <use href="#sq" y="48" class="bg-empty" />
        <use href="#sq" y="60" class="bg-empty" />
        <use href="#sq" y="72" class="bg-empty" />
      </g>
      
      <pattern id="fullGrid" width="12" height="84" patternUnits="userSpaceOnUse">
        <use href="#week" />
      </pattern>
    </defs>

    <rect width="720" height="84" fill="url(#fullGrid)" />

    <g>
      <rect width="10" height="46" rx="2" class="red" x="400" y="12">
        <animate attributeName="x" values="800;400;400;398;402;400;800" keyTimes="0;0.2;0.5;0.52;0.54;0.8;1" dur="10s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;1;1;1;1;0" dur="10s" repeatCount="indefinite" />
      </rect>
      <text class="red code-bit" x="400" y="8">
        CONFLICT_ERR
        <animate attributeName="x" values="800;400;400;398;402;400;800" keyTimes="0;0.2;0.5;0.52;0.54;0.8;1" dur="10s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0;1;0;1;0" dur="0.5s" repeatCount="indefinite" />
      </text>
    </g>

    <g id="fixers">
      <g>
        <rect width="10" height="10" rx="2" class="L4">
          <animateTransform attributeName="transform" type="translate" values="350,-50; 350,24; 350,24; 350,-50" keyTimes="0;0.1;0.8;1" dur="10s" repeatCount="indefinite" />
        </rect>
        <rect width="8" height="2" class="L4" opacity="0">
          <animate attributeName="x" values="360;395" dur="0.1s" begin="2s" repeatCount="40" />
          <animate attributeName="opacity" values="0;1;0" dur="0.1s" begin="2s" repeatCount="40" />
          <animateTransform attributeName="transform" type="translate" values="0,28; 0,28" dur="10s" repeatCount="indefinite" />
        </rect>
      </g>
      
      <g>
        <rect width="10" height="10" rx="2" class="L4">
          <animateTransform attributeName="transform" type="translate" values="350,-50; 350,48; 350,48; 350,-50" keyTimes="0;0.12;0.82;1" dur="10s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>

    <g transform="translate(400, 35)" opacity="0">
      <text x="-5" y="-5" class="red code-bit">ERROR</text>
      <text x="5" y="10" class="L3 code-bit">PATCHING</text>
      <text x="12" y="-8" class="red code-bit">!</text>
      <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.1;1" dur="1s" begin="5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1;2.5" dur="0.5s" begin="5s" repeatCount="indefinite" />
    </g>
  </g>

  <g transform="translate(650, 160)">
    <text x="-35" y="10" class="text">Less</text>
    <rect x="0" y="0" width="10" height="10" rx="2" class="bg-empty" />
    <rect x="15" y="0" width="10" height="10" rx="2" class="L1" />
    <rect x="30" y="0" width="10" height="10" rx="2" class="L2" />
    <rect x="45" y="0" width="10" height="10" rx="2" class="L3" />
    <rect x="60" y="0" width="10" height="10" rx="2" class="L4" />
    <text x="75" y="10" class="text">More</text>
  </g>

  <text x="65" y="170" class="text" style="fill:#58a6ff; font-family:monospace;">
    [SYSTEM] : DETECTING UNCOMMITTED CHANGES...
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite" />
  </text>
</svg>
