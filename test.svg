<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117; border-radius: 10px; border: 1px solid #30363d;">
  <style>
    /* The Button Style */
    #scared-button {
      fill: #238636;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .btn-text {
      fill: white;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 14px;
      pointer-events: none;
      text-anchor: middle;
    }

    /* Trigger Zones: Invisible boxes that push the button away */
    .trigger { fill: transparent; }

    /* Moving the button based on which zone is hovered */
    #t1:hover ~ #scared-button { transform: translate(400px, 200px); }
    #t2:hover ~ #scared-button { transform: translate(50px, 220px); }
    #t3:hover ~ #scared-button { transform: translate(350px, 50px); }
    #t4:hover ~ #scared-button { transform: translate(100px, 100px); }
    
    /* Change text when it's actively running */
    .trigger:hover ~ #scared-button .btn-text::after {
      content: "NOPE";
    }
  </style>

  <rect id="t1" class="trigger" x="0" y="0" width="300" height="150" />
  <rect id="t2" class="trigger" x="300" y="0" width="300" height="150" />
  <rect id="t3" class="trigger" x="0" y="150" width="300" height="150" />
  <rect id="t4" class="trigger" x="300" y="150" width="300" height="150" />

  <g id="scared-button" transform="translate(240, 130)">
    <rect width="120" height="40" rx="8" />
    <text x="60" y="25" class="btn-text">CLICK ME</text>
  </g>

  <text x="10" y="20" fill="#8b949e" font-family="monospace" font-size="10">SYSTEM_STATUS: ANXIOUS_UI_ELEMENT</text>
</svg>
